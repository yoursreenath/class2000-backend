# ── Production Profile (PostgreSQL on Neon) ─────────────────────────
# These values are injected as environment variables on Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Neon requires SSL
spring.datasource.hikari.data-source-properties.sslmode=require

# ── Server ──────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── CORS: set to your Vercel frontend URL ───────────────────────────
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN}

# ── File Upload ─────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Cloudinary (set these env vars on Render) ───────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
